version: "3.8"

services:
  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: job_orchestrator
    working_dir: /app
    volumes:
      - ../:/app
    command: node apps/orchestrator/index.js
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  browser-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: job_browser_worker
    working_dir: /app
    volumes:
      - ../:/app
    command: node apps/browser-worker/index.js
    shm_size: "2gb"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: job_dashboard
    working_dir: /app
    volumes:
      - ../:/app
    ports:
      - "3000:3000"
    command: node apps/dashboard/index.js
    environment:
      - NODE_ENV=production
    restart: unless-stopped
